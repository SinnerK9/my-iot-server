<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>Hub 联调测试</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: monospace; max-width: 600px; margin: 40px auto; padding: 16px; }
        h2 { margin-bottom: 12px; }
        .row { display: flex; gap: 8px; margin-bottom: 8px; }
        #status { padding: 4px 12px; border-radius: 4px; display: inline-block; font-size: 14px; }
        .on  { background: #d4edda; color: #155724; }
        .off { background: #f8d7da; color: #721c24; }
        #log { border: 1px solid #ccc; height: 300px; overflow-y: auto; padding: 8px; margin: 12px;}
        .msg { border-bottom: 1px solid #eee; padding: 4px 0; }
        .time { color: #999; margin-right: 8px; }
        input { flex: 1; padding: 8px; font-size: 14px; }
        button { padding: 8px 16px; cursor: pointer; }
        .note { color: #666; font-size: 12px; margin-top: 8px; }
    </style>
</head>
<body>
    <h2>WebSocket Hub 联调</h2>

    <label>Access Token（先登录获取）：</label>
    <div class="row">
        <input id="token" placeholder="粘贴你的 JWT access_token">
        <button onclick="connect()">连接 WS</button>
        <button onclick="ws.close()">断开</button>
    </div>
    <div>状态：<span id="status" class="off">未连接</span> <span id="count"></span></div>

    <div id="log"></div>

    <div class="row">
        <input id="msg" placeholder="输入消息..." onkeydown="if(event.key==='Enter')send()">
        <button onclick="send()">发送</button>
    </div>
    <div class="note">
        提示：打开 3 个标签页，全部连上。一个发消息 → 另外两个收到。<br>
        关掉一个标签页 → 服务器不崩溃。闲置 60 秒 → 心跳超时自动断开。
    </div>

<script>
let ws = null;
let pingCount = 0;

function log(text, color) {
    const d = document.getElementById('log');
    const now = new Date().toLocaleTimeString();
    const div = document.createElement('div');
    div.className = 'msg';
    div.innerHTML = `<span class="time">${now}</span> <span style="color:${color||'#333'}">${text}</span>`;
    d.appendChild(div);
    d.scrollTop = d.scrollHeight;
}

function setStatus(on, text) {
    const s = document.getElementById('status');
    s.className = on ? 'on' : 'off';
    s.textContent = text || (on ? '已连接' : '未连接');
}

function connect() {
    const token = document.getElementById('token').value.trim();
    if (!token) { alert('请先粘贴 JWT token'); return; }

    if (ws) ws.close();

    const url = `ws://localhost:7777/v1/ws?token=${encodeURIComponent(token)}`;
    ws = new WebSocket(url);

    ws.onopen = function() {
        log('✅ WebSocket 连接成功', '#155724');
        setStatus(true);
        pingCount = 0;
    };

    ws.onmessage = function(e) {
        // 收到消息——就是其他标签页发的广播
        log('📩 收到广播: ' + e.data, '#0066cc');
    };

    ws.onclose = function(e) {
        log('❌ 连接断开 (code=' + e.code + ' reason=' + e.reason + ')', '#721c24');
        setStatus(false);
    };

    ws.onerror = function(e) {
        log('⚠️ WebSocket 错误', '#ff6600');
    };
}

function send() {
    const input = document.getElementById('msg');
    const msg = input.value.trim();
    if (!msg) return;
    if (!ws || ws.readyState !== WebSocket.OPEN) {
        alert('未连接');
        return;
    }
    ws.send(msg);
    log('📤 你: ' + msg, '#333');
    input.value = '';
    input.focus();
}
</script>
</body>
</html>
