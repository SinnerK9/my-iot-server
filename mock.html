<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SHVA 智能家居演示</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#f0f2f5;min-height:100vh;display:flex;justify-content:center;padding:20px}
.panel{width:100%;max-width:480px;display:flex;flex-direction:column;gap:12px}
.card{background:#fff;border-radius:12px;padding:16px;box-shadow:0 1px 3px rgba(0,0,0,.08)}
h3{font-size:15px;margin-bottom:10px;color:#333}
.row{display:flex;gap:8px}
input,select{flex:1;padding:10px 12px;border:1px solid #d9d9d9;border-radius:8px;font-size:14px;outline:none}
input:focus{border-color:#4a90e2;box-shadow:0 0 0 2px rgba(74,144,226,.15)}
button{padding:10px 16px;border:none;border-radius:8px;font-size:14px;cursor:pointer;white-space:nowrap;font-weight:500}
.btn-primary{background:#4a90e2;color:#fff}
.btn-primary:hover{background:#357abd}
.btn-outline{background:#fff;color:#4a90e2;border:1px solid #4a90e2}
.btn-outline:hover{background:#e8f0fe}
.btn-danger{background:#e74c3c;color:#fff}
.btn-success{background:#27ae60;color:#fff}
#log{border:1px solid #e8e8e8;border-radius:8px;height:280px;overflow-y:auto;padding:10px;font-size:13px;background:#fafafa}
.log-line{margin-bottom:4px;line-height:1.5}
.log-time{color:#999;margin-right:6px}
.log-in{color:#155724}
.log-out{color:#721c24}
.log-send{color:#333}
.log-recv{color:#0066cc}
.log-err{color:#e74c3c}
.log-sys{color:#4a90e2}
.status{display:inline-block;padding:3px 10px;border-radius:10px;font-size:12px;font-weight:500}
.status-on{background:#d4edda;color:#155724}
.status-off{background:#f8d7da;color:#721c24}
#device-list{display:flex;flex-wrap:wrap;gap:8px}
.device-tag{display:inline-flex;align-items:center;gap:4px;padding:5px 10px;border-radius:16px;font-size:13px}
.device-online{background:#d4edda;color:#155724}
.device-offline{background:#f0f0f0;color:#999}
.dot{width:8px;height:8px;border-radius:50%}
.dot-on{background:#27ae60}
.dot-off{background:#ccc}
</style>
</head>
<body>
<div class="panel">
  <h2 style="text-align:center;color:#333">SHVA 智能家居演示</h2>

  <!-- 登录区 -->
  <div class="card">
    <h3>1. 登录</h3>
    <div class="row" style="margin-bottom:8px">
      <input id="account" placeholder="手机号/邮箱" value="13800138000">
    </div>
    <div class="row">
      <input id="password" type="password" placeholder="密码" value="12345678">
      <button class="btn-primary" onclick="login()">登录</button>
    </div>
    <div style="margin-top:6px;font-size:12px;color:#999">
      状态：<span id="login-status" class="status status-off">未登录</span>
    </div>
  </div>

  <!-- WS 连接区 -->
  <div class="card">
    <h3>2. WebSocket 连接</h3>
    <div class="row">
      <button class="btn-success" id="btn-connect" onclick="connectWS()">连接 WS</button>
      <button class="btn-danger" id="btn-disconnect" onclick="disconnectWS()" disabled>断开</button>
    </div>
    <div style="margin-top:6px;font-size:12px;color:#999">
      状态：<span id="ws-status" class="status status-off">未连接</span>
    </div>
  </div>

  <!-- 消息收发区 -->
  <div class="card">
    <h3>3. 发送指令</h3>
    <div class="row" style="margin-bottom:8px">
      <input id="msg" placeholder="输入指令，如：打开客厅的灯" onkeydown="if(event.key==='Enter')sendMsg()">
      <button class="btn-primary" id="btn-send" onclick="sendMsg()" disabled>发送</button>
    </div>
    <div style="font-size:12px;color:#999;margin-bottom:8px">
      快捷指令：
      <button style="font-size:11px;padding:4px 8px;margin:2px" onclick="quickSend('打开客厅的灯')">开客厅灯</button>
      <button style="font-size:11px;padding:4px 8px;margin:2px" onclick="quickSend('关闭所有灯')">关所有灯</button>
      <button style="font-size:11px;padding:4px 8px;margin:2px" onclick="quickSend('空调调到26度')">空调26度</button>
      <button style="font-size:11px;padding:4px 8px;margin:2px" onclick="quickSend('打开窗帘')">开窗帘</button>
    </div>
    <div id="log"></div>
  </div>

  <!-- 设备列表区 -->
  <div class="card">
    <h3>4. 我的设备</h3>
    <div class="row" style="margin-bottom:8px">
      <button class="btn-primary" onclick="createDemoDevice()" style="font-size:13px">一键创建演示设备（客厅灯）</button>
      <button class="btn-outline" onclick="loadDevices()">刷新列表</button>
    </div>
    <div id="device-list"></div>
  </div>
</div>

<script>
const API = 'http://localhost:7777/v1';
let token = '', ws = null;

function log(text, cls) {
  const d = document.getElementById('log');
  const now = new Date().toLocaleTimeString();
  const div = document.createElement('div');
  div.className = 'log-line';
  div.innerHTML = '<span class="log-time">' + now + '</span><span class="' + (cls||'') + '">' + text + '</span>';
  d.appendChild(div);
  d.scrollTop = d.scrollHeight;
}

// ── 1. 登录 ──
async function login() {
  const account = document.getElementById('account').value.trim();
  const password = document.getElementById('password').value.trim();
  if (!account || !password) { alert('请填写账号和密码'); return; }

  try {
    const res = await fetch(API + '/auth/login', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({account: account, password: password})
    });
    const data = await res.json();
    if (data.code === 0) {
      token = data.data.access_token;
      document.getElementById('login-status').className = 'status status-on';
      document.getElementById('login-status').textContent = '已登录 (uid=' + data.data.user.user_id + ')';
      document.getElementById('btn-connect').disabled = false;
      log('登录成功', 'log-sys');
    } else {
      log('登录失败: ' + data.msg, 'log-err');
    }
  } catch(e) {
    log('网络错误: ' + e.message, 'log-err');
  }
}

// ── 2. WebSocket ──
function connectWS() {
  if (!token) { alert('请先登录'); return; }
  if (ws) ws.close();

  const url = 'ws://localhost:7777/v1/ws?token=' + encodeURIComponent(token);
  ws = new WebSocket(url);

  ws.onopen = function() {
    document.getElementById('ws-status').className = 'status status-on';
    document.getElementById('ws-status').textContent = '已连接';
    document.getElementById('btn-disconnect').disabled = false;
    document.getElementById('btn-send').disabled = false;
    log('WS 连接成功', 'log-in');
  };

  ws.onmessage = function(e) {
    try {
      const msg = JSON.parse(e.data);
      if (msg.type === 'device_command') {
        log('反馈: ' + msg.action + ' → ' + (msg.name || msg.device_id), 'log-recv');
      } else if (msg.type === 'error') {
        log(msg.msg, 'log-err');
      } else if (msg.type === 'llm_response') {
        log(msg.text, 'log-recv');
      } else if (msg.type === 'device_status') {
        log('设备 ' + msg.device_id + ' 状态更新', 'log-sys');
      }
    } catch(_) {
      log(e.data, 'log-recv');
    }
  };

  ws.onclose = function(e) {
    document.getElementById('ws-status').className = 'status status-off';
    document.getElementById('ws-status').textContent = '未连接 (code=' + e.code + ')';
    document.getElementById('btn-disconnect').disabled = true;
    document.getElementById('btn-send').disabled = true;
    log('WS 断开', 'log-out');
  };

  ws.onerror = function() {
    log('WS 错误', 'log-err');
  };
}

function disconnectWS() {
  if (ws) ws.close();
}

// ── 3. 发送消息 ──
function sendMsg() {
  const input = document.getElementById('msg');
  const text = input.value.trim();
  if (!text) return;
  if (!ws || ws.readyState !== WebSocket.OPEN) { alert('WS 未连接'); return; }
  ws.send(text);
  log('你: ' + text, 'log-send');
  input.value = '';
  input.focus();
}

function quickSend(text) {
  document.getElementById('msg').value = text;
  sendMsg();
}

// ── 4. 设备列表 ──
async function createDemoDevice() {
  if (!token) { alert('请先登录'); return; }
  try {
    const res = await fetch(API + '/devices', {
      method: 'POST',
      headers: {'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token},
      body: JSON.stringify({device_id:'light-'+Date.now(), type:'light', name:'客厅灯', room:'客厅'})
    });
    const data = await res.json();
    if (data.code === 0) {
      log('设备创建成功 (id=' + data.data.id + ')', 'log-sys');
      loadDevices();
    } else {
      log('创建设备: ' + data.msg, 'log-err');
    }
  } catch(e) {
    log('网络错误: ' + e.message, 'log-err');
  }
}

async function loadDevices() {
  if (!token) { alert('请先登录'); return; }
  try {
    const res = await fetch(API + '/devices', {
      headers: {'Authorization': 'Bearer ' + token}
    });
    const data = await res.json();
    const container = document.getElementById('device-list');
    if (data.code !== 0 || !data.data || !data.data.length) {
      container.innerHTML = '<span style="color:#999;font-size:13px">暂无设备，请先绑定</span>';
      return;
    }
    container.innerHTML = data.data.map(function(d) {
      var online = d.status === 'online';
      return '<span class="device-tag ' + (online ? 'device-online' : 'device-offline') + '">'
        + '<span class="dot ' + (online ? 'dot-on' : 'dot-off') + '"></span>'
        + (d.name || d.device_id) + ' (' + (d.room||'未分配') + ')'
        + '</span>';
    }).join('');
  } catch(e) {
    log('获取设备列表失败: ' + e.message, 'log-err');
  }
}
</script>
</body>
</html>
